<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Job Poster User - Skillzaar</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      max-width: 600px;
      margin: 50px auto;
      padding: 20px;
      background: linear-gradient(135deg, #e0f7fa, #e8f5e9);
      min-height: 100vh;
    }
    .container {
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.12);
    }
    h1 { color: #1f2937; margin-top: 0; }
    .form-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      color: #374151;
      font-weight: 500;
    }
    input {
      width: 100%;
      padding: 10px;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      font-size: 14px;
      box-sizing: border-box;
    }
    button {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      font-size: 16px;
      margin-top: 10px;
    }
    button:hover {
      opacity: 0.9;
    }
    button:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }
    .result {
      margin-top: 20px;
      padding: 15px;
      border-radius: 8px;
      display: none;
    }
    .success {
      background: #d1fae5;
      border: 1px solid #6ee7b7;
      color: #065f46;
    }
    .error {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #b91c1c;
    }
    .info {
      background: #dbeafe;
      border: 1px solid #93c5fd;
      color: #1e40af;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    pre {
      background: #f3f4f6;
      padding: 10px;
      border-radius: 6px;
      overflow-x: auto;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛠️ Create Job Poster User</h1>

    <div class="info">
      <strong>📋 Default Credentials:</strong><br>
      Email: jobposter@test.com<br>
      Password: Test123456
    </div>

    <form id="createUserForm">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" value="jobposter@test.com" required>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" value="Test123456" required>
      </div>

      <div class="form-group">
        <label>Display Name</label>
        <input type="text" id="displayName" value="Test Job Poster" required>
      </div>

      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" id="phoneNumber" value="+923001234567" required>
      </div>

      <div class="form-group">
        <label>City</label>
        <input type="text" id="city" value="Islamabad" required>
      </div>

      <div class="form-group">
        <label>Address</label>
        <input type="text" id="address" value="F-8, Islamabad" required>
      </div>

      <button type="submit" id="submitBtn">Create User</button>
    </form>

    <div id="result" class="result"></div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js';
    import { getAuth, createUserWithEmailAndPassword, updateProfile } from 'https://www.gstatic.com/firebasejs/11.10.0/firebase-auth.js';
    import { getFirestore, doc, setDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/11.10.0/firebase-firestore.js';

    // Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyALzdd7qQdemxo4BHN--GRkLZ0GFlbEwLA",
      authDomain: "skillzaar-bcb0f.firebaseapp.com",
      projectId: "skillzaar-bcb0f",
      storageBucket: "skillzaar-bcb0f.firebasestorage.app",
      messagingSenderId: "18417914632",
      appId: "1:18417914632:web:9c08693103ccd713d892bd"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const form = document.getElementById('createUserForm');
    const resultDiv = document.getElementById('result');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const displayName = document.getElementById('displayName').value;
      const phoneNumber = document.getElementById('phoneNumber').value;
      const city = document.getElementById('city').value;
      const address = document.getElementById('address').value;

      submitBtn.disabled = true;
      submitBtn.textContent = 'Creating user...';
      resultDiv.style.display = 'none';

      try {
        // Create user in Firebase Authentication
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        // Update profile
        await updateProfile(user, {
          displayName: displayName
        });

        // Create user document in Firestore
        await setDoc(doc(db, 'JobPosters', user.uid), {
          uid: user.uid,
          email: email,
          displayName: displayName,
          phoneNumber: phoneNumber,
          city: city,
          address: address,
          createdAt: serverTimestamp(),
          isActive: true,
          profileComplete: true,
        });

        resultDiv.className = 'result success';
        resultDiv.style.display = 'block';
        resultDiv.innerHTML = `
          <strong>✅ Job Poster user created successfully!</strong><br><br>
          <strong>Login Credentials:</strong><br>
          <pre>Email: ${email}
Password: ${password}
UID: ${user.uid}</pre>
          <br>
          💡 You can now login with these credentials at the admin panel.
        `;

        form.reset();
      } catch (error) {
        resultDiv.className = 'result error';
        resultDiv.style.display = 'block';

        let errorMessage = error.message;
        if (error.code === 'auth/email-already-exists' || error.code === 'auth/email-already-in-use') {
          errorMessage = 'This email is already registered. Try logging in with: jobposter@test.com / Test123456';
        }

        resultDiv.innerHTML = `<strong>❌ Error:</strong><br>${errorMessage}`;
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Create User';
      }
    });
  </script>
</body>
</html>
