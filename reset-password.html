<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Job Poster Password - Skillzaar</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      max-width: 600px;
      margin: 50px auto;
      padding: 20px;
      background: linear-gradient(135deg, #e0f7fa, #e8f5e9);
      min-height: 100vh;
    }
    .container {
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.12);
    }
    h1 { color: #1f2937; margin-top: 0; }
    .form-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      color: #374151;
      font-weight: 500;
    }
    input {
      width: 100%;
      padding: 10px;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      font-size: 14px;
      box-sizing: border-box;
    }
    button {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      font-size: 16px;
      margin-top: 10px;
    }
    button:hover {
      opacity: 0.9;
    }
    button:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }
    .result {
      margin-top: 20px;
      padding: 15px;
      border-radius: 8px;
      display: none;
    }
    .success {
      background: #d1fae5;
      border: 1px solid #6ee7b7;
      color: #065f46;
    }
    .error {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #b91c1c;
    }
    .info {
      background: #dbeafe;
      border: 1px solid #93c5fd;
      color: #1e40af;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    pre {
      background: #f3f4f6;
      padding: 10px;
      border-radius: 6px;
      overflow-x: auto;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔑 Reset Job Poster Password</h1>

    <div class="info">
      <strong>📋 Instructions:</strong><br>
      Enter the email address to send a password reset link.
    </div>

    <form id="resetPasswordForm">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" value="jobposter@test.com" required>
      </div>

      <button type="submit" id="submitBtn">Send Password Reset Email</button>
    </form>

    <div id="result" class="result"></div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js';
    import { getAuth, sendPasswordResetEmail } from 'https://www.gstatic.com/firebasejs/11.10.0/firebase-auth.js';

    // Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyALzdd7qQdemxo4BHN--GRkLZ0GFlbEwLA",
      authDomain: "skillzaar-bcb0f.firebaseapp.com",
      projectId: "skillzaar-bcb0f",
      storageBucket: "skillzaar-bcb0f.firebasestorage.app",
      messagingSenderId: "18417914632",
      appId: "1:18417914632:web:9c08693103ccd713d892bd"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const form = document.getElementById('resetPasswordForm');
    const resultDiv = document.getElementById('result');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value;

      submitBtn.disabled = true;
      submitBtn.textContent = 'Sending...';
      resultDiv.style.display = 'none';

      try {
        await sendPasswordResetEmail(auth, email);

        resultDiv.className = 'result success';
        resultDiv.style.display = 'block';
        resultDiv.innerHTML = `
          <strong>✅ Password reset email sent!</strong><br><br>
          Check your email inbox for the password reset link.<br>
          Email: ${email}
        `;
      } catch (error) {
        resultDiv.className = 'result error';
        resultDiv.style.display = 'block';
        resultDiv.innerHTML = `<strong>❌ Error:</strong><br>${error.message}`;
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Send Password Reset Email';
      }
    });
  </script>
</body>
</html>
