<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Check & Fix Job Poster User - Skillzaar</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      max-width: 700px;
      margin: 50px auto;
      padding: 20px;
      background: linear-gradient(135deg, #e0f7fa, #e8f5e9);
      min-height: 100vh;
    }
    .container {
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.12);
    }
    h1 { color: #1f2937; margin-top: 0; }
    h2 { color: #374151; font-size: 18px; margin-top: 30px; }
    .form-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      color: #374151;
      font-weight: 500;
    }
    input {
      width: 100%;
      padding: 10px;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      font-size: 14px;
      box-sizing: border-box;
    }
    button {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      font-size: 16px;
      margin-top: 10px;
    }
    button:hover {
      opacity: 0.9;
    }
    button:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }
    .btn-secondary {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
    }
    .result {
      margin-top: 20px;
      padding: 15px;
      border-radius: 8px;
      display: none;
    }
    .success {
      background: #d1fae5;
      border: 1px solid #6ee7b7;
      color: #065f46;
    }
    .error {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #b91c1c;
    }
    .info {
      background: #dbeafe;
      border: 1px solid #93c5fd;
      color: #1e40af;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    pre {
      background: #f3f4f6;
      padding: 10px;
      border-radius: 6px;
      overflow-x: auto;
      font-size: 13px;
    }
    .section {
      margin-bottom: 30px;
      padding-bottom: 30px;
      border-bottom: 2px solid #e5e7eb;
    }
    .section:last-child {
      border-bottom: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛠️ Job Poster User Management</h1>

    <div class="info">
      <strong>💡 Use this tool to:</strong><br>
      1. Create a new job poster user with email/password<br>
      2. Test login with existing credentials<br>
      3. Send password reset email if needed
    </div>

    <!-- Section 1: Create User -->
    <div class="section">
      <h2>1️⃣ Create New User</h2>
      <form id="createUserForm">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="createEmail" value="jobposter@test.com" required>
        </div>

        <div class="form-group">
          <label>Password (min 6 characters)</label>
          <input type="password" id="createPassword" value="Test123456" required minlength="6">
        </div>

        <div class="form-group">
          <label>Display Name</label>
          <input type="text" id="displayName" value="Test Job Poster" required>
        </div>

        <div class="form-group">
          <label>Phone Number</label>
          <input type="tel" id="phoneNumber" value="+923001234567" required>
        </div>

        <button type="submit" id="createBtn">Create User</button>
      </form>
      <div id="createResult" class="result"></div>
    </div>

    <!-- Section 2: Test Login -->
    <div class="section">
      <h2>2️⃣ Test Login</h2>
      <form id="loginForm">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="loginEmail" value="jobposter@test.com" required>
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" value="Test123456" required>
        </div>

        <button type="submit" id="loginBtn" class="btn-secondary">Test Login</button>
      </form>
      <div id="loginResult" class="result"></div>
    </div>

    <!-- Section 3: Reset Password -->
    <div class="section">
      <h2>3️⃣ Send Password Reset Email</h2>
      <form id="resetForm">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="resetEmail" value="jobposter@test.com" required>
        </div>

        <button type="submit" id="resetBtn" class="btn-secondary">Send Reset Email</button>
      </form>
      <div id="resetResult" class="result"></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js';
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendPasswordResetEmail, updateProfile, signOut } from 'https://www.gstatic.com/firebasejs/11.10.0/firebase-auth.js';
    import { getFirestore, doc, setDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/11.10.0/firebase-firestore.js';

    // Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyALzdd7qQdemxo4BHN--GRkLZ0GFlbEwLA",
      authDomain: "skillzaar-bcb0f.firebaseapp.com",
      projectId: "skillzaar-bcb0f",
      storageBucket: "skillzaar-bcb0f.firebasestorage.app",
      messagingSenderId: "18417914632",
      appId: "1:18417914632:web:9c08693103ccd713d892bd"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Create User Form
    document.getElementById('createUserForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('createEmail').value;
      const password = document.getElementById('createPassword').value;
      const displayName = document.getElementById('displayName').value;
      const phoneNumber = document.getElementById('phoneNumber').value;

      const btn = document.getElementById('createBtn');
      const resultDiv = document.getElementById('createResult');

      btn.disabled = true;
      btn.textContent = 'Creating...';
      resultDiv.style.display = 'none';

      try {
        // Create user
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        // Update profile
        await updateProfile(user, { displayName });

        // Create Firestore document
        await setDoc(doc(db, 'JobPosters', user.uid), {
          uid: user.uid,
          email: email,
          displayName: displayName,
          phoneNumber: phoneNumber,
          city: 'Islamabad',
          address: 'F-8, Islamabad',
          createdAt: serverTimestamp(),
          isActive: true,
          profileComplete: true,
        });

        // Sign out after creation
        await signOut(auth);

        resultDiv.className = 'result success';
        resultDiv.style.display = 'block';
        resultDiv.innerHTML = `
          <strong>✅ User created successfully!</strong><br><br>
          <pre>Email: ${email}
Password: ${password}
UID: ${user.uid}</pre>
          <br>Now try logging in with Section 2 below.
        `;
      } catch (error) {
        resultDiv.className = 'result error';
        resultDiv.style.display = 'block';
        let msg = error.message;
        if (error.code === 'auth/email-already-in-use') {
          msg = 'Email already exists. Try testing login in Section 2 or reset password in Section 3.';
        }
        resultDiv.innerHTML = `<strong>❌ Error:</strong><br>${msg}`;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Create User';
      }
    });

    // Test Login Form
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;

      const btn = document.getElementById('loginBtn');
      const resultDiv = document.getElementById('loginResult');

      btn.disabled = true;
      btn.textContent = 'Testing...';
      resultDiv.style.display = 'none';

      try {
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        // Sign out after test
        await signOut(auth);

        resultDiv.className = 'result success';
        resultDiv.style.display = 'block';
        resultDiv.innerHTML = `
          <strong>✅ Login successful!</strong><br><br>
          <pre>Email: ${email}
UID: ${user.uid}
Display Name: ${user.displayName || 'Not set'}</pre>
          <br>You can now login to the admin panel with these credentials.
        `;
      } catch (error) {
        resultDiv.className = 'result error';
        resultDiv.style.display = 'block';
        let msg = error.message;
        if (error.code === 'auth/invalid-credential' || error.code === 'auth/wrong-password') {
          msg = 'Invalid email or password. Try resetting password in Section 3.';
        } else if (error.code === 'auth/user-not-found') {
          msg = 'User not found. Create a new user in Section 1.';
        }
        resultDiv.innerHTML = `<strong>❌ Login failed:</strong><br>${msg}`;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Test Login';
      }
    });

    // Reset Password Form
    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('resetEmail').value;

      const btn = document.getElementById('resetBtn');
      const resultDiv = document.getElementById('resetResult');

      btn.disabled = true;
      btn.textContent = 'Sending...';
      resultDiv.style.display = 'none';

      try {
        await sendPasswordResetEmail(auth, email);

        resultDiv.className = 'result success';
        resultDiv.style.display = 'block';
        resultDiv.innerHTML = `
          <strong>✅ Password reset email sent!</strong><br><br>
          Check the inbox for: ${email}<br>
          Click the link in the email to set a new password.
        `;
      } catch (error) {
        resultDiv.className = 'result error';
        resultDiv.style.display = 'block';
        resultDiv.innerHTML = `<strong>❌ Error:</strong><br>${error.message}`;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Send Reset Email';
      }
    });
  </script>
</body>
</html>
